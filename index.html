<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evidence Observer</title>
  <meta name="description" content="Structured data analysis with immutable sources, typed operations, and audit trails.">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      margin: 0;
    }
    #app {
      display: flex;
      min-height: 100vh;
    }
    .init-loading {
      text-align: center;
      color: #475569;
    }
    .init-loading .glyph {
      font-size: 2.5rem;
      margin-bottom: 16px;
      color: #3b82f6;
    }
    .init-loading .helix {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 12px;
      letter-spacing: 0.08em;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div class="init-loading">
      <div class="glyph"><i class="ph ph-atom" style="font-size: 2.5rem;"></i></div>
      <div class="spinner"></div>
      <div>Loading Evidence Observer</div>
      <div class="helix">Validate · Type · Import · Filter · Join · Merge · Compare · Branch · Reconcile</div>
    </div>
  </div>

  <!-- sql.js — SQLite in WebAssembly -->
  <script src="lib/sql-wasm.js"></script>

  <!-- Application -->
  <script type="module">
    import { initApp } from './src/app.js';

    if (typeof initSqlJs !== 'undefined') {
      initApp();
    } else {
      window.addEventListener('load', () => {
        if (typeof initSqlJs !== 'undefined') {
          initApp();
        } else {
          document.getElementById('app').innerHTML = `
            <div class="init-loading">
              <div class="glyph" style="color: #ef4444;"><i class="ph ph-warning-circle" style="font-size: 2.5rem;"></i></div>
              <div>Failed to load sql.js</div>
              <div class="helix">Ensure lib/sql-wasm.js and lib/sql-wasm.wasm are present</div>
            </div>
          `;
        }
      });
    }
  </script>
</body>
</html>
